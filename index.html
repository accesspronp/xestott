<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zest OTT | Digital Authorized Store</title>
  <link rel="icon" type="image/png" href="zest-logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="cartoon-body">

<header class="cartoon-nav">
  <a class="cartoon-brand" href="index.html">
    <img src="zest-logo.png">
    <div>
      <strong>ZEST OTT</strong>
      <small>Digital Authorized Store</small>
    </div>
  </a>

  <nav class="cartoon-links">
    <a href="#products">Deals</a>
    <a href="cart.html">Cart 🛒</a>
    <a href="orders.html">My Orders</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<section class="cartoon-hero">
  <h1>HUGE <span>APPS</span><br>FOR CHEAP!</h1>
  <p>Premium subscriptions with instant delivery.</p>
</section>

<main id="products">

<section class="cartoon-grid">

<div class="cartoon-card">
<h3>Google 5TB + Google AI Pro</h3>
<select id="google">
<option data-price="2449">18 Months - Rs. 2449</option>
<option data-price="1949">12 Months - Rs. 1949</option>
</select>
<button onclick="buyNow('Google 5TB + Google AI Pro','google','email')">BUY NOW</button>
</div>

<div class="cartoon-card">
<h3>Netflix</h3>
<select id="netflix">
<option data-price="489">3 Months - Rs. 489</option>
<option data-price="189">1 Month - Rs. 189</option>
</select>
<button onclick="buyNow('Netflix','netflix','normal')">BUY NOW</button>
</div>

</section>

</main>

<footer class="cartoon-footer">
  <strong>ZEST OTT</strong>
  <p>© 2026 Zest OTT</p>
</footer>

<script>
function buyNow(product, selectId, formType) {
  const select = document.getElementById(selectId);
  const selected = select.options[select.selectedIndex];

  const duration = selected.textContent.trim();
  const price = selected.getAttribute("data-price") || "0";

  window.location.href =
    "buy.html?product=" + encodeURIComponent(product) +
    "&duration=" + encodeURIComponent(duration) +
    "&price=" + encodeURIComponent(price) +
    "&type=" + encodeURIComponent(formType);
}
</script>

<script src="cart-system.js"></script>
<script type="module" src="order-preview.js"></script>

</body>
</html>
