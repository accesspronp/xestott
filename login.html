<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Zest OTT</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="zest-logo.png">
  <link rel="apple-touch-icon" href="zest-logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a class="brand brand-link" href="index.html">
    <img src="zest-logo.png" alt="Zest OTT Logo">
    <div>
      <h2>Zest OTT</h2>
      <p>Digital Authorized Store</p>
    </div>
  </a>

  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="index.html#refund">Refund Policy</a>
    <a href="https://wa.me/9779744413521" target="_blank">Contact Us</a>
  </nav>
</header>

<section class="auth-page">
  <div class="auth-card">
    <span class="mini-badge">Official Firebase Login</span>
    <h1>Sign in to Zest OTT</h1>
    <p>Login with your Google account to continue as a customer.</p>

    <button class="google-btn" onclick="googleLogin()">
      <span>G</span>
      Sign in with Google
    </button>

    <button class="logout-btn" onclick="logoutUser()">
      Logout
    </button>

    <div id="loginResult" class="auth-result">Not logged in yet.</div>
</div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBa-JOyK4DOZeAYTFzccUJB_zzLhaRVkFA",
  authDomain: "zest-6eb10.firebaseapp.com",
  projectId: "zest-6eb10",
  storageBucket: "zest-6eb10.firebasestorage.app",
  messagingSenderId: "623978058263",
  appId: "1:623978058263:web:f48c19c3c819997172c252",
  measurementId: "G-E0CY6L0NRW"
};

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.googleLogin = async function () {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;

      localStorage.setItem("zestUser", user.displayName || "");
      localStorage.setItem("zestEmail", user.email || "");
      localStorage.setItem("zestPhoto", user.photoURL || "");

      document.getElementById("loginResult").innerHTML =
        "✅ Logged in as <b>" + (user.displayName || user.email) + "</b><br>" +
        "<small>" + user.email + "</small>";
    } catch (error) {
      document.getElementById("loginResult").innerHTML =
        "❌ " + error.message;
    }
  };

  window.logoutUser = async function () {
    await signOut(auth);
    localStorage.removeItem("zestUser");
    localStorage.removeItem("zestEmail");
    localStorage.removeItem("zestPhoto");
    document.getElementById("loginResult").innerHTML = "Logged out.";
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginResult").innerHTML =
        "✅ Logged in as <b>" + (user.displayName || user.email) + "</b><br>" +
        "<small>" + user.email + "</small>";
    } else {
      document.getElementById("loginResult").innerHTML = "Not logged in yet.";
    }
  });
</script>

</body>
</html>
