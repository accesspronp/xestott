<script type="module">
import { auth, db } from "./firebase.js";
import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const product = params.get("product") || "Selected Product";
const duration = params.get("duration") || "Selected Duration";
const price = params.get("price") || "Add Later";
const type = params.get("type") || "normal";

document.getElementById("productName").innerText = product;
document.getElementById("durationName").innerText = duration;
document.getElementById("priceName").innerText =
  price === "Add Later" ? "Add Later" : "Rs. " + price;

const orderId = "ZEST-" + Date.now();

let currentUser = null;
let selectedPayment = "eSewa";

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

const specialFields = document.getElementById("specialFields");

if (type === "login") {
  specialFields.innerHTML = `
    <div class="special-box">
      <h3>Account Setup Details</h3>
      <p>Please enter email and password carefully.</p>

      <label class="field-label">Email</label>
      <input id="emailField" type="email" placeholder="Enter account email">

      <label class="field-label">Password</label>
      <input id="passwordField" type="text" placeholder="Enter password">

      <label class="check-line">
        <input id="confirmLogin" type="checkbox">
        I confirm email and password are correct.
      </label>
    </div>
  `;
} else if (type === "email") {
  specialFields.innerHTML = `
    <div class="special-box">
      <h3>Own Email Setup</h3>
      <p>Enter the email where you want activation.</p>

      <label class="field-label">Email</label>
      <input id="emailField" type="email" placeholder="Enter your email">

      <label class="check-line">
        <input id="confirmLogin" type="checkbox">
        I confirm this email is correct.
      </label>
    </div>
  `;
} else {
  specialFields.innerHTML = `
    <div class="special-box">
      <h3>Order Info</h3>
      <p>After payment, click Place Order. Your order will be saved on the website.</p>

      <label class="field-label">Email / Contact</label>
      <input id="emailField" type="email" placeholder="Enter email or contact email">
    </div>
  `;
}

window.selectPayment = function(method) {
  selectedPayment = method === "esewa" ? "eSewa" : "Fonepay";

  document.getElementById("fonepayPanel").classList.toggle("active-pay-panel", method === "fonepay");
  document.getElementById("esewaPanel").classList.toggle("active-pay-panel", method === "esewa");

  document.querySelector(".fonepay-method").classList.toggle("active-method", method === "fonepay");
  document.querySelector(".esewa-method").classList.toggle("active-method", method === "esewa");
};

function valueOf(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : "";
}

window.placeOrder = async function() {
  if (!currentUser) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  const accountEmail = valueOf("emailField");
  const accountPassword = valueOf("passwordField");
  const note = valueOf("noteBox");
  const receiptInput = document.getElementById("receiptFile");
  const receiptName = receiptInput && receiptInput.files.length
    ? receiptInput.files[0].name
    : "Not uploaded";

  const confirmBox = document.getElementById("confirmLogin");
  if (confirmBox && !confirmBox.checked) {
    alert("Please confirm your details are correct.");
    return;
  }

  if (!accountEmail) {
    alert("Please enter email/contact details.");
    return;
  }

  try {
    await addDoc(collection(db, "orders"), {
      orderId,
      userEmail: currentUser.email,
      userName: currentUser.displayName || "",
      product,
      duration,
      price,
      amountText: price === "Add Later" ? "Please confirm price" : "Rs. " + price,
      setupType: type,
      accountEmail,
      accountPassword: accountPassword || "",
      note: note || "",
      receiptName,
      paymentMethod: selectedPayment,
      paymentStatus: "pending",
      orderStatus: "pending",
      createdAt: serverTimestamp()
    });

    alert("Order placed successfully!");
    window.location.href = "orders.html";
  } catch (error) {
    console.error(error);
    alert("Order failed: " + error.message);
  }
};
</script>
